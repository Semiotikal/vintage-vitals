name: Fetch Mods Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Updates once a day automatically

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Game Version TagID
        id: fetch_tagid
        run: |
          # The API returns a list; we want the last stable version's tagid
          TAGID=$(curl -s "https://mods.vintagestory.at/api/gameversions" | jq -r '.gameversions | map(select(.active == true)) | last | .tagid')
          echo "tagid=$TAGID" >> $GITHUB_ENV

      - name: Fetch Mods Data
        run: |
          # Fetch mods for that version and save to mods.json
          curl -s "https://mods.vintagestory.at/api/mods?gameversions[]=${{ env.tagid }}" | jq '[.mods[] | {modidstrs, name, lastreleased, logo}]' > mods.json
          
      - name: Commit and Push mods.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mods.json
          git commit -m "Update mods.json for game version ${{ env.tagid }}" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
