name: Fetch Mods Data and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Latest Game Version TagID
        id: fetch_tagid
        run: |
          # Fetch the latest active tagid and set it as a step output
          TAGID=$(curl -s "https://mods.vintagestory.at/api/gameversions" | jq -r '.gameversions | map(select(.active == true)) | last | .tagid')
          echo "tagid=$TAGID" >> $GITHUB_OUTPUT

      - name: Fetch Mods Data
        run: |
          # Use the output from the previous step
          # We add a check to make sure TAGID isn't empty or null
          TAGID="${{ steps.fetch_tagid.outputs.tagid }}"
          if [ "$TAGID" = "null" ] || [ -z "$TAGID" ]; then
            echo "Error: Could not retrieve a valid TagID"
            exit 1
          fi
          
          curl -s "https://mods.vintagestory.at/api/mods?gameversions[]=$TAGID" | jq '[.mods[] | {modidstrs, name, lastreleased, logo}]' > mods.json
          
      - name: Commit and Push mods.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mods.json
          git commit -m "Update mods.json for game version ${{ steps.fetch_tagid.outputs.tagid }}" || echo "No changes to commit"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
