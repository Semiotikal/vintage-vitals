name: Update Version File on Release
on:
  release:
    types: [published]

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main # <--- Add this! This ensures we are on the branch, not the tag.

      - name: Write Version to File
        run: |
          echo "${{ github.event.release.tag_name }}" > VERSION

      - name: Commit and Push VERSION
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add VERSION
          git commit -m "chore: update VERSION to ${{ github.event.release.tag_name }}"
          # Explicitly push to main to avoid the detached HEAD error
          git push origin main
